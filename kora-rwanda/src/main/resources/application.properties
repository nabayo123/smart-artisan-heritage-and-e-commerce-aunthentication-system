# ===============================
# 1. DATABASE CONNECTION
# ===============================
# MariaDB Database Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/kora_rwanda?useSSL=false&serverTimezone=Africa/Kigali&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Server Configuration
server.port=8080
server.servlet.context-path=
server.address=0.0.0.0

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.korarwandasystem=DEBUG

# ===============================
# 2. SECURITY & JWT
# ===============================
# Secret key should be at least 256-bit (Base64 encoded)
app.jwtSecret=korarwandaSecretKeyForJWTTokenGenerationThatIsLongEnoughToMeet256BitsRequirement
# Token validity (e.g., 24 hours = 86400000 ms)
app.jwtExpirationInMs=86400000

# ===============================
# 3. FILE STORAGE
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB