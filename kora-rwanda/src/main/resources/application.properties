# ============================================================
# KORA-RWANDA APPLICATION CONFIG
# All secrets are read from environment variables.
# Set these in Render → Environment tab (or your .env locally).
# ============================================================

# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=kora-rwanda

# ── Database ─────────────────────────────────────────────────
# Render env-var: DB_URL  (full JDBC URL including credentials)
# Example: jdbc:mysql://sql8.freesqldatabase.com:3306/sql8824146?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=${DB_URL:jdbc:mysql://sql8.freesqldatabase.com:3306/sql8824146?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:sql8824146}
spring.datasource.password=${DB_PASSWORD:4cHeaqR4tX}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.precision.datetime=0
spring.jpa.properties.hibernate.type.precision.timestamp=0
spring.jpa.properties.hibernate.dialect.storage_engine=innodb
spring.jpa.open-in-view=false

# ── HikariCP Connection Pool ─────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.validation-timeout=5000

# ── H2 Console (disabled in all environments) ────────────────
spring.h2.console.enabled=false

# ── JWT ───────────────────────────────────────────────────────
# Render env-var: JWT_SECRET  (min 256-bit random string)
app.jwt.secret=${JWT_SECRET:Kora-Rwanda-Secret-Key-2024-Very-Long-Secret-Key-For-JWT-Signing}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Render env-var: UPLOAD_DIR  (mount path of the Render Disk)
app.upload.dir=${UPLOAD_DIR:uploads}

# ── SpringDoc / Swagger ───────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ───────────────────────────────────────────────────
logging.level.com.korarwanda.kora=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}

# ── Mail (SMTP) ───────────────────────────────────────────────
# Render env-vars: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:nabayoclementine@gmail.com}
spring.mail.password=${MAIL_PASSWORD:wbllbvvkdibqguew}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
