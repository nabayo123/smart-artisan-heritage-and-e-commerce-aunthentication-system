<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account | Kora-Rwanda</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a373;
            --primary-dark: #bc8a5f;
            --dark: #0f172a;
            --card-bg: #1e293b;
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--dark); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .verify-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 4rem; width: 100%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
        }

        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 1rem; line-height: 1.5; }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%; background: #0f172a; border: 1px solid var(--border); padding: 1.2rem; border-radius: 16px; 
            color: white; transition: 0.3s; font-size: 1rem; font-family: monospace; letter-spacing: 2px;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }

        .btn-verify {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #1a1a1a;
            padding: 1.2rem; border-radius: 16px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 1rem;
        }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,163,115,0.3); }

        .alert { padding: 1.2rem; border-radius: 12px; margin-bottom: 1.5rem; display: none; font-size: 0.95rem; text-align: left; }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .alert-success { background: rgba(34, 197, 194, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
        .resend-container { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .btn-resend { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; padding: 0.2rem; }
        .btn-resend:disabled { color: var(--text-muted); cursor: not-allowed; text-decoration: none; }
    </style>
</head>
<body>

    <div class="verify-card">
        <div class="icon">📩</div>
        <h1>Check your Email</h1>
        <p>We've sent a 6-digit verification code to your email. Please enter it below to activate your account.</p>

        <div id="alert-box" class="alert"></div>

        <form id="verify-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required readonly style="opacity: 0.7; font-family: 'Outfit'; letter-spacing: normal;">
            </div>
            <div class="form-group" style="display:none;">
                <label>Role</label>
                <input type="text" id="role" readonly>
            </div>
            <div class="form-group">
                <label>6-Digit Code</label>
                <input type="text" id="code" required maxlength="6" placeholder="000000" style="text-align: center; font-size: 1.5rem;">
            </div>
            <button type="submit" class="btn-verify">Verify Account</button>
        </form>
        <div class="resend-container">
            Didn't receive a code? <button id="btn-resend" class="btn-resend" onclick="resendCode()">Resend Code</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');
        const roleParam = urlParams.get('role');

        if (emailParam) document.getElementById('email').value = emailParam;
        if (roleParam) document.getElementById('role').value = roleParam;

        const form = document.getElementById('verify-form');
        const alertBox = document.getElementById('alert-box');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-verify');
            const originalText = btn.textContent;
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const role = document.getElementById('role').value;

            if (code.length !== 6) {
                showAlert('Code must be exactly 6 digits.', 'error');
                btn.textContent = originalText;
                btn.disabled = false;
                return;
            }

            try {
                const res = await fetch('/api/auth/verify-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, role })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    showAlert('Account verified successfully! Redirecting to login...', 'success');
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    showAlert(data.message || 'Invalid code. Please try again.', 'error');
                }
            } catch (err) {
                showAlert('Connection error. Is the server running?', 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        };

        async function resendCode() {
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const btn = document.getElementById('btn-resend');

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch('/api/auth/resend-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, role })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    showAlert('New verification code sent to your email!', 'success');
                    let timeLeft = 60;
                    const timer = setInterval(() => {
                        if (timeLeft <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.textContent = 'Resend Code';
                        } else {
                            btn.textContent = `Resend available in ${timeLeft}s`;
                            timeLeft--;
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || 'Failed to resend code.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Resend Code';
                }
            } catch (err) {
                showAlert('Connection error. Is the server running?', 'error');
                btn.disabled = false;
                btn.textContent = 'Resend Code';
            }
        }

        function showAlert(msg, type) {
            alertBox.textContent = msg;
            alertBox.className = 'alert ' + (type === 'error' ? 'alert-error' : 'alert-success');
            alertBox.style.display = 'block';
        }
    </script>
</body>
</html>
