# ================================
# KORA-RWANDA APPLICATION CONFIG
# ================================

# Server
server.port=8080
spring.application.name=kora-rwanda

# ================================
# DATABASE CONFIGURATION
# ================================
# ================================
# DATABASE CONFIGURATION (MySQL)
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/kora_rwanda_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate for MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 Console (Optional, disabled)
spring.h2.console.enabled=false

# ================================
# JWT CONFIGURATION
# ================================
app.jwt.secret=KoraRwandaSecretKey2024VeryLongSecretKeyForJWTSigningAtLeast256Bits
app.jwt.expiration-ms=86400000

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# ================================
# SPRINGDOC / SWAGGER
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# LOGGING
# ================================
logging.level.com.korarwanda=DEBUG
logging.level.org.springframework.security=INFO

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=nabayoclementine@gmail.com
spring.mail.password=wbllbvvkdibqguew
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
