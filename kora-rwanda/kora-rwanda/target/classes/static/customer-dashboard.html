<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard | Kora-Rwanda</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a373;
            --primary-dark: #bc8a5f;
            --dark: #0f172a;
            --card-bg: #1e293b;
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--dark); color: white; display: flex; min-height: 100vh; }

        aside { width: 280px; background: rgba(15, 23, 42, 0.9); border-right: 1px solid var(--border); padding: 2.5rem; display: flex; flex-direction: column; gap: 2.5rem; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .nav-items li a { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 12px; color: var(--text-muted); text-decoration: none; transition: 0.3s; font-weight: 500; }
        .nav-items li a:hover { background: rgba(255,255,255,0.05); color: var(--primary); }

        main { flex: 1; padding: 4rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem; }
        h1 { font-size: 2.5rem; font-weight: 800; }

        .order-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; margin-bottom: 1.5rem; transition: 0.3s; }
        .order-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .order-id { font-weight: 700; color: white; opacity: 0.9; }
        .order-status { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 0.4rem 1rem; border-radius: 10px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        .order-items { border-top: 1px solid var(--border); padding-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: 500; }
        .item-price { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">KORA.RWANDA</div>
        <ul class="nav-items" style="list-style: none;">
            <li><a href="/marketplace.html">Explore Marketplace</a></li>
            <li><a href="/customer-dashboard.html" style="background: rgba(212, 163, 115, 0.1); color: var(--primary);">My Orders</a></li>
            <li><a href="/security.html">Security Settings</a></li>
            <li><a href="/login.html" onclick="localStorage.clear()">Logout</a></li>
        </ul>
    </aside>

    <main>
        <header>
            <div>
                <h1>Your Orders</h1>
                <p style="color: var(--text-muted);">Track your verified Rwandan crafts.</p>
            </div>
            <div>
                <span id="cust-name" style="font-weight: 600; font-size: 1.1rem; color: var(--primary);">Customer Name</span>
            </div>
        </header>

        <div id="orders-container">
            <p style="padding: 2rem; text-align: center; color: var(--text-muted);">Fetching your treasures...</p>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('kora_token');
        const user = JSON.parse(localStorage.getItem('kora_user'));

        if (!token || user.role !== 'ROLE_CUSTOMER') window.location.href = '/login.html';
        document.getElementById('cust-name').textContent = user.fullName;

        async function loadOrders() {
            try {
                const res = await fetch(`/api/orders/customer/${user.userId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                const container = document.getElementById('orders-container');
                
                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map(o => `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <span class="order-id">ORDER #${o.orderId}</span>
                                    <div style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem;">Placed on: ${new Date(o.orderDate).toLocaleDateString()}</div>
                                </div>
                                <span class="order-status">${o.orderStatus}</span>
                            </div>
                            <div class="order-items">
                                ${o.orderItems.map(item => `
                                    <div class="item-row">
                                        <div style="display: flex; flex-direction: column;">
                                            <span class="item-name">${item.productName} (x${item.quantity})</span>
                                            ${item.heritageHash ? `<a href="/verify-heritage.html?hash=${item.heritageHash}" style="font-size: 0.75rem; color: var(--primary); text-decoration:none; font-weight:700;">🛡️ VERIFY HERITAGE</a>` : ''}
                                        </div>
                                        <span class="item-price">RWF ${item.unitPrice.toLocaleString()}</span>
                                    </div>
                                `).join('')}
                                <div class="item-row" style="margin-top: 1rem; border-top: 1px dashed var(--border); padding-top: 1rem;">
                                    <span style="font-weight: 800;">Total Paid</span>
                                    <span style="font-weight: 800; font-size: 1.3rem; color: white;">RWF ${o.totalAmount.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 4rem;"><h3>No orders yet.</h3><p style="color: var(--text-muted); margin-top: 1rem;">Explore our collection of authentic crafts!</p></div>';
                }
            } catch (err) { container.innerHTML = '<p>Error loading orders.</p>'; }
        }

        function logout() { localStorage.clear(); }
        loadOrders();
    </script>
</body>
</html>
