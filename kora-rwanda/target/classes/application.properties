# ================================
# KORA-RWANDA APPLICATION CONFIG
# ================================

# Server
server.port=8080
spring.application.name=kora-rwanda

# ================================
# DATABASE CONFIGURATION
# ================================
# H2 In-Memory Database (Switch from MySQL)
spring.datasource.url=jdbc:h2:mem:kora_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================
# JWT CONFIGURATION
# ================================
app.jwt.secret=KoraRwandaSecretKey2024VeryLongSecretKeyForJWTSigningAtLeast256Bits
app.jwt.expiration-ms=86400000

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# ================================
# SPRINGDOC / SWAGGER
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# LOGGING
# ================================
logging.level.com.korarwanda=DEBUG
logging.level.org.springframework.security=INFO
