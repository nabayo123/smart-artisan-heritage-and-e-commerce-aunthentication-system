<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Settings | Kora-Rwanda</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a373;
            --primary-dark: #bc8a5f;
            --dark: #0f172a;
            --card-bg: #1e293b;
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--dark); color: white; display: flex; min-height: 100vh; }

        aside { width: 280px; background: rgba(15, 23, 42, 0.9); border-right: 1px solid var(--border); padding: 2.5rem; display: flex; flex-direction: column; gap: 2.5rem; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .nav-items li a { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 12px; color: var(--text-muted); text-decoration: none; transition: 0.3s; font-weight: 500; }
        .nav-items li a:hover { background: rgba(255,255,255,0.05); color: var(--primary); }
        .nav-items li a.active { background: rgba(212, 163, 115, 0.1); color: var(--primary); }

        main { flex: 1; padding: 4rem; display: flex; align-items: flex-start; justify-content: center; gap: 2rem; flex-wrap: wrap; }
        
        .security-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 3rem; width: 100%; max-width: 500px; }
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
        p { color: var(--text-muted); margin-bottom: 2.5rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input { width: 100%; background: #0f172a; border: 1px solid var(--border); padding: 1rem; border-radius: 12px; color: white; transition: 0.3s; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: var(--primary); }

        .btn-update { width: 100%; background: var(--primary); color: #0f172a; padding: 1rem; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-update:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,163,115,0.3); }
        
        .alert { padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; display: none; font-size: 0.95rem; }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .alert-success { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>
    <aside>
        <div class="logo">KORA.RWANDA</div>
        <ul class="nav-items" style="list-style: none;">
            <li><a href="/marketplace.html">Explore Platform</a></li>
            <li><a id="dashboard-link" href="#">Back to Dashboard</a></li>
            <li><a href="/security.html" class="active">Security Settings</a></li>
            <li><a href="/login.html" onclick="localStorage.clear()">Log Out</a></li>
        </ul>
    </aside>

    <main>
        <div class="security-container">
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                <a id="back-btn-security" href="#" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 0.5rem 1rem; border-radius: 10px; text-decoration: none; font-size: 0.8rem; font-weight: 600;">
                    ⬅️ Back
                </a>
                <h1 style="margin-bottom: 0;">Security Settings</h1>
            </div>
            <p>Update your password to keep your account safe.</p>

            <div id="alert-box" class="alert"></div>

            <form id="security-form">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="current-password" required placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" required placeholder="New password (min. 6 characters)">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-password" required placeholder="Confirm new password">
                </div>
                <button type="submit" class="btn-update">Update Password</button>
            </form>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('kora_user'));
        const token = localStorage.getItem('kora_token');

        if (!user || !token) window.location.href = '/login.html';

        // Update dashboard and back link based on role
        const dashLink = document.getElementById('dashboard-link');
        const backBtn = document.getElementById('back-btn-security');
        let target = '/';
        if (user.role === 'ROLE_ADMIN') target = '/admin-dashboard.html';
        else if (user.role === 'ROLE_ARTISAN') target = '/artisan-dashboard.html';
        else target = '/customer-dashboard.html';
        
        dashLink.href = target;
        backBtn.href = target;

        const form = document.getElementById('security-form');
        const alertBox = document.getElementById('alert-box');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const currentPass = document.getElementById('current-password').value;
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass !== confirmPass) {
                showAlert('New passwords do not match!', 'error');
                return;
            }

            if (newPass.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }

            try {
                const res = await fetch('/api/auth/update-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({
                        email: user.email,
                        currentPassword: currentPass,
                        newPassword: newPass,
                        role: user.role.replace('ROLE_', '')
                    })
                });

                const data = await res.json();
                if (data.success) {
                    showAlert('Password updated successfully!', 'success');
                    form.reset();
                } else {
                    showAlert(data.message || 'Error updating password.', 'error');
                }
            } catch (err) {
                showAlert('Connection error. Please try again.', 'error');
            }
        };

        function showAlert(msg, type) {
            alertBox.textContent = msg;
            alertBox.className = 'alert ' + (type === 'error' ? 'alert-error' : 'alert-success');
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
