# ===============================
# 1. DATABASE CONNECTION
# ===============================
# H2 Database Configuration (Embedded - No external server needed!)
spring.datasource.url=jdbc:h2:mem:kora_rwanda_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Configuration
server.port=8080
server.servlet.context-path=
server.address=0.0.0.0

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.korarwandasystem=DEBUG

# ===============================
# 2. SECURITY & JWT
# ===============================
# Secret key should be at least 256-bit (Base64 encoded)
app.jwtSecret=korarwandaSecretKeyForJWTTokenGenerationThatIsLongEnoughToMeet256BitsRequirement
# Token validity (e.g., 24 hours = 86400000 ms)
app.jwtExpirationInMs=86400000

# ===============================
# 3. FILE STORAGE
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB