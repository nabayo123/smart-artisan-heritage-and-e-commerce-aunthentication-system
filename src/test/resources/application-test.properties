# Test Profile Configuration
spring.profiles.active=test

# H2 Test Database
spring.datasource.url=jdbc:h2:mem:kora_rwanda_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate for testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT Configuration for testing
app.jwtSecret=korarwandaTestSecretKeyForJWTTokenGenerationThatIsLongEnoughToMeet256BitsRequirement
app.jwtExpirationInMs=86400000

# Logging for testing
logging.level.com.korarwandasystem=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
