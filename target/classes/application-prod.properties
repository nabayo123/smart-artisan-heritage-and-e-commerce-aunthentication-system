# Production Environment Configuration
spring.profiles.active=prod

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MySQL Database Configuration (for production)
spring.datasource.url=jdbc:mysql://localhost:3306/kora_rwanda_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=kora_user
spring.datasource.password=secure_password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=koraRwandaProductionSecretKey2024VeryLongAndSecure
jwt.expiration=86400000

# Logging Configuration
logging.level.com.korarwandasystem=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/kora-rwanda.log

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Application Configuration
spring.application.name=kora-rwanda
management.endpoints.web.exposure.include=health,info
