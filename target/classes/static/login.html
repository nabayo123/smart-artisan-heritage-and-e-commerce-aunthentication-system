<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kora Rwanda</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <a href="/index.html" class="back-link">← Back to Home</a>
                <h2>Welcome <span class="highlight">Back</span></h2>
                <p>Enter your credentials to access your account.</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div id="loginAlert" class="alert hidden"></div>
                
                <button type="submit" class="btn btn-primary btn-full" id="loginSubmitBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="loader hidden"></span>
                </button>
                
                <p class="auth-footer">
                    Don't have an account? <a href="/register.html" class="text-link">Register here</a>
                </p>
            </form>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
