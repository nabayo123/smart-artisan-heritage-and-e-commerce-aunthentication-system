services:
  - type: web
    name: kora-rwanda
    runtime: docker
    dockerfilePath: ./kora-rwanda/Dockerfile
    dockerContext: ./kora-rwanda
    plan: free          # change to starter/standard for production
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # ── Server ──────────────────────────────────────────────────────
      - key: PORT
        value: 8080

      # ── Database ─────────────────────────────────────────────────────
      - key: DB_URL
        sync: false     # set manually in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # ── JWT ───────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_EXPIRATION_MS
        value: "86400000"

      # ── Mail (SMTP) ───────────────────────────────────────────────────
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

      # ── File Upload ───────────────────────────────────────────────────
      - key: UPLOAD_DIR
        value: /app/uploads

    # Persist the uploads folder across deploys (paid plans only)
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
